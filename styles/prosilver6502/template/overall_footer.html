<!-- Site nav hamburger toggle -->
<script>
(function() {
	var btn = document.querySelector('.nav-toggle');
	if (btn) {
		btn.onclick = function() {
			var links = document.querySelector('.nav-links');
			if (links.className.indexOf('open') !== -1) {
				links.className = links.className.replace(' open', '');
			} else {
				links.className += ' open';
			}
		};
	}
})();
</script>

<!-- Override selectCode so clicking "Select all" again deselects -->
<script>
var _origSelectCode = selectCode;
selectCode = function(a) {
	var s = window.getSelection();
	var e = a.parentNode.parentNode.getElementsByTagName('CODE')[0];
	if (s.rangeCount > 0 && s.containsNode(e, true) && s.toString().length > 0) {
		s.removeAllRanges();
		return;
	}
	_origSelectCode(a);
};
</script>
